<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mah Gowri ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  background:black;
  overflow:hidden;
}

/* scenes */
.scene {
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
}

.active { display:flex; }

/* background */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, #ff9a9e, #000);
  animation: pulse 6s infinite;
}
@keyframes pulse {
  50% { filter: brightness(1.3); }
}

/* title */
h1 {
  font-family:'Great Vibes',cursive;
  font-size:2.5em;
}

/* button */
button {
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff6f91;
  font-size:1.1em;
  cursor:pointer;
}

/* slideshow */
.slideshow img {
  width:180px;
  height:260px;
  border-radius:20px;
  object-fit:cover;
  box-shadow:0 0 25px rgba(255,255,255,0.5);
}

/* counter */
.counter {
  margin-top:10px;
  font-size:1.1em;
}

/* message */
#text {
  max-width:90%;
  margin-top:20px;
  font-size:1.2em;
  line-height:1.8;
  white-space:pre-line;
  overflow-y:auto;
  max-height:60vh;
}

/* final */
#final {
  font-family:'Great Vibes',cursive;
  font-size:2em;
  padding:20px;
}

/* hearts */
.heart {
  position:fixed;
  bottom:-10px;
  font-size:18px;
  animation:float 6s linear infinite;
}
@keyframes float {
  to { transform:translateY(-100vh); }
}

/* 💻 DESKTOP OPTIMIZATION */
@media (min-width: 768px) {

  h1 {
    font-size:3.5em;
  }

  .slideshow img {
    width:280px;
    height:400px;
  }

  button {
    font-size:1.3em;
    padding:14px 30px;
  }

  .counter {
    font-size:1.4em;
  }

  #text {
    max-width:800px;
    font-size:1.4em;
  }

  #final {
    font-size:2.8em;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- Scene 1 -->
<div class="scene active" id="scene1">
  <h1>Hey mah love 💖</h1>
  <button onclick="next(1)">Open this 💌</button>
</div>

<!-- Scene 2 -->
<div class="scene" id="scene2">
  <h1>Us, mah cutiee ❤️</h1>
  <div class="slideshow">
    <img id="slide" src="image1.jpg">
  </div>
  <div class="counter" id="counter"></div>
  <button onclick="next(2)">Continue 💕</button>
</div>

<!-- Scene 3 -->
<div class="scene" id="scene3">
  <h1>For mah booboo 💌</h1>
  <button onclick="startTyping()">Read this cutiee</button>
  <div id="text"></div>
</div>

<!-- Scene 4 -->
<div class="scene" id="scene4">
  <div id="final">
    I love you forever mah love ❤️
  </div>
</div>

<audio id="music" src="music.mp3"></audio>

<script>
/* scene switch */
function next(n){
  document.getElementById("scene"+n).classList.remove("active");
  document.getElementById("scene"+(n+1)).classList.add("active");
  document.getElementById("music").play().catch(()=>{});
}

/* slideshow */
let imgs=["image1.jpg","image2.jpg","image3.jpg"];
let i=0;
setInterval(()=>{
  document.getElementById("slide").src=imgs[i%3];
  i++;
},2000);

/* LIVE COUNTER */
const startDate = new Date("2016-06-04T08:30:00");

function updateCounter() {
  const now = new Date();
  const diff = now - startDate;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("counter").innerText =
    "I’ve loved you for " +
    days + " days, " +
    hours + " hours, " +
    minutes + " minutes, " +
    seconds + " seconds ❤️";
}

setInterval(updateCounter, 1000);
updateCounter();

/* message */
const msg = `Happy 6 months mah lovely, sweetie cutiee Booboo baby ❤️

I don’t even know where to start honestly…
it still feels unreal to me sometimes.

Like… the same girl I used to like back in 2nd grade…
is the same girl I get to call mine today.

Back then I didn’t even understand what love was,
I just knew there was something about you,
something different,
something that made me notice you without even trying.

And somehow after all these years…
it’s still you.

Out of everyone,
out of everything,
it was always you.

These past 6 months with you…
they’ve genuinely been the happiest part of mah life.

Every time we talk,
every time we laugh,
even the smallest, random, stupid moments with you…

they mean so much to me.

You make mah days better without even trying.
Just seeing your name pop up,
just talking to you,
just having you there…

it changes everything.

Mah sweetiee,
you don’t even realize how much you mean to me.

I love you so much,
like actually so so much,
more than I ever thought I could love someone.

And the best part is…
this isn’t just 6 months for me.

I can see this turning into years.

More memories with you
more late night talks
more random laughs
more moments where I just sit there and think

“damn… she’s mine”

I want more of you
more of us
for a really really long time.

I want to keep loving you,
keep choosing you,
again and again,
every single day.

Thank you for staying
thank you for choosing me
thank you for being mah girl

mah cute, beautiful, perfect lil booboo ❤️

I’ve loved you for so many years already…
and I promise you,

I’m never ever going to stop.`;

/* typing */
let j=0;
function startTyping(){
  type();
}
function type(){
  if(j<msg.length){
    document.getElementById("text").innerHTML+=msg[j];
    j++;
    setTimeout(type,18);
  } else {
    setTimeout(()=>next(3),1500);
  }
}

/* hearts */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);
</script>

</body>
</html>
